version: '3.8'

volumes:
  db_data:
  
services:
  db:
    image: postgres:15-alpine
    container_name: postgres-prolife
    environment:
      POSTGRES_USER: prolife_user
      POSTGRES_PASSWORD: Prolife2026
      POSTGRES_DB: prolife_db
    ports:
      - "5434:5432"
    volumes:
      - ./database:/docker-entrypoint-initdb.d # Ejecuta el SQL al iniciar

  api:
    build: ./backend
    container_name: flask-prolife-api
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: prolife_db
      DB_USER: prolife_user
      DB_PASS: Prolife2026
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: prolife-frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true # Para que detecte cambios en Windows
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api